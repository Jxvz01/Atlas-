<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS+ | Tactical Intelligence Portal</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="cache-banner" class="cache-banner" style="display: none; position: sticky; top: 0; z-index: 1000; background: #ffcc00; color: #000; padding: 10px; font-weight: 600; text-align: center; font-size: 0.8rem;"></div>
    <!-- 1. ENTRY PORTAL (Simplified) -->
    <div id="welcomeScreen" class="entry-portal">
        <div class="portal-content" style="max-width: 400px; padding: 2.5rem;">
            <div class="portal-header" style="margin-bottom: 2rem; text-align: center;">
                <h1 class="portal-title" style="font-size: 2.5rem;">ATLAS<span>+</span></h1>
                <p class="portal-subtitle">SECURE TERMINAL ACCESS</p>
            </div>
            
            <div class="auth-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="input-group">
                    <label style="color: var(--text-muted); font-size: 0.7rem; letter-spacing: 2px;">OPERATOR NAME</label>
                    <input type="text" id="operatorName" placeholder="Enter name..." style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none;" />
                </div>
                <div class="input-group">
                    <label style="color: var(--text-muted); font-size: 0.7rem; letter-spacing: 2px;">ACCESS ROLE</label>
                    <select id="operatorRole" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none;">
                        <option value="ENGINEER">Engineer</option>
                        <option value="TECHNICIAN">Technician</option>
                    </select>
                </div>
                <button class="action-btn primary" onclick="handleSimpleLogin()" style="width: 100%; padding: 14px; margin-top: 1rem;">INITIALIZE PORTAL</button>
            </div>

            <div class="portal-footer" style="margin-top: 2.5rem; justify-content: center;">
                <span class="status-msg" style="font-size: 0.6rem; opacity: 0.5;">ATLAS_V4.0 • PRODUCTION READY</span>
            </div>
        </div>
    </div>

    <!-- 2. LOGIN OVERLAY (Hidden initially) -->
    <div id="login-container" class="auth-wrapper" style="display: none;">
        <div class="auth-card">
            <div class="auth-header">
                <h2 id="loginTitle">ROLE AUTHENTICATION</h2>
                <button class="back-btn" onclick="goBackToWelcome()">← BACK</button>
            </div>
            <div class="auth-form" id="loginForm">
                <div class="input-group">
                    <label>OPERATOR_ID</label>
                    <input type="text" id="username" placeholder="Enter ID..." required />
                </div>
                <div class="input-group">
                    <label>ACCESS_KEY</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>
                <div id="auth-error" class="auth-error"></div>
                <button type="submit" class="auth-submit" onclick="handleLogin()">ACCESS PORTAL</button>
            </div>
            <div class="auth-footer">
                <span>SYSTEM: READY</span>
                <span>NODE: OSCAR-09</span>
            </div>
        </div>
    </div>

    <div class="app-container" style="display: none;">
        <!-- SIDEBAR NAVIGATION -->
        <aside class="side-nav">
            <div class="side-top">
                <div class="brand">ATLAS<span>+</span></div>
                <div class="sentinel-tag">
                    <span class="sentinel-icon">🛡️</span>
                    <div class="s-info">
                        <div class="s-ver">SENTINEL V2.4</div>
                        <div class="s-node">NODE: OSCAR-09</div>
                    </div>
                </div>
            </div>

            <nav class="nav-menu" id="sidebarMenu">
                <!-- Dynamically rendered by role -->
            </nav>

            <button class="emergency-btn">EMERGENCY STOP</button>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="main-wrapper">
            <header class="top-bar">
                <nav class="view-links" id="topNav">
                    <a href="#" class="active" id="homeTab" onclick="showSimplePage('homePage')">HOME</a>
                    <a href="#" id="digitalTab" onclick="showSimplePage('digitalTwinPage')">DIGITAL TWIN</a>
                </nav>

                <div class="top-actions">
                    <div class="role-selector-wrap" style="margin-right: 1.5rem;">
                        <select id="roleSelector" onchange="switchRole(this.value)" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 0.75rem;">
                            <option value="ENGINEER">Engineer view</option>
                            <option value="TECHNICIAN">Technician view</option>
                        </select>
                    </div>
                    <div class="profile-module">
                        <div class="profile-info">
                            <span class="role-label" id="roleIndicator">ENGINEER</span>
                        </div>
                        <div class="user-avatar"></div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
                    <span class="icon-btn" title="System Settings">⚙️</span>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- VIEWPORT ENGINE -->
                <div class="viewport-content" id="viewport">
                    <section id="homePage" class="page"></section>
                    <section id="digitalTwinPage" class="page" style="display: none;"></section>
                    <section id="alertStackPage" class="page" style="display: none;"></section>
                    <section id="analyticsPage" class="page" style="display: none;"></section>
                    <section id="diagnosticsPage" class="page" style="display: none;"></section>
                    <div id="schedulerPage" class="page" style="display: none;"></div>
                </div>

                <!-- AI INSIGHTS SIDEBAR -->
                <aside class="insight-sidebar">
                    <div class="ai-header">
                        <span class="ai-icon">🧠</span>
                        <div class="ai-title">
                            <h3>AI INSIGHTS</h3>
                            <p>Predictive Engine Active</p>
                        </div>
                    </div>

                    <div class="insight-feed" id="insight-feed">
                        <!-- Dynamic Insights -->
                    </div>

                    <div class="live-feed-wrap">
                        <div class="live-feed">
                            <span>LIVE FEED: NODE-09 SYSTEM OVERWATCH</span>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js?v=4.0"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS+ | Predictive Intelligence System</title>
    <meta name="description" content="AI-powered predictive maintenance dashboard for industrial machine monitoring">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="cache-banner" class="cache-banner" style="display: none;"></div>

    <!-- ══════════════════════════════════════
         1. ENTRY PORTAL — ATMOSPHERIC LOGIN
         ══════════════════════════════════════ -->
    <div id="welcomeScreen" class="entry-portal">
        <!-- Floating particle canvas -->
        <canvas id="particleCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;"></canvas>

        <div class="portal-content">
            <div class="portal-header" style="margin-bottom: 2.5rem; text-align: center;">
                <h1 class="portal-title">ATLAS<span>+</span></h1>
                <p class="portal-subtitle">PREDICTIVE MAINTENANCE INTELLIGENCE</p>
            </div>

            <div class="auth-form" style="display: flex; flex-direction: column; gap: 1.25rem;">
                <div class="input-group">
                    <label>OPERATOR NAME</label>
                    <input type="text" id="operatorName" placeholder="Enter your name..." />
                </div>
                <div class="input-group">
                    <label>ACCESS ROLE</label>
                    <select id="operatorRole">
                        <option value="ENGINEER">Engineer</option>
                        <option value="TECHNICIAN">Technician</option>
                    </select>
                </div>
                <button class="action-btn primary" onclick="handleSimpleLogin()" style="width: 100%; padding: 14px; margin-top: 0.75rem; font-size: 0.8rem;">
                    INITIALIZE SESSION →
                </button>
            </div>

            <div class="portal-footer">
                <span class="pulse-dot"></span>
                <span class="status-msg">ATLAS V4.0 • SYSTEM ONLINE</span>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         2. MAIN APPLICATION SHELL
         ══════════════════════════════════════ -->
    <div class="app-container" style="display: none;">
        <!-- SIDEBAR -->
        <aside class="side-nav">
            <div class="side-top">
                <div class="brand">ATLAS<span>+</span></div>
                <div class="sentinel-tag">
                    <span class="sentinel-icon">🛡️</span>
                    <div class="s-info">
                        <div class="s-ver">SENTINEL V2.4</div>
                        <div class="s-node">NODE: OSCAR-09</div>
                    </div>
                </div>
            </div>

            <nav class="nav-menu" id="sidebarMenu">
                <!-- Dynamically rendered by role -->
            </nav>

            <button class="emergency-btn">⚠ EMERGENCY STOP</button>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="main-wrapper">
            <header class="top-bar">
                <nav class="view-links" id="topNav">
                    <a href="#" class="active" id="homeTab" onclick="showSimplePage('homePage')">HOME</a>
                    <a href="#" id="digitalTab" onclick="showSimplePage('digitalTwinPage')">DIGITAL TWIN</a>
                </nav>

                <div class="top-actions">
                    <div class="profile-module">
                        <span class="role-label" id="roleIndicator">ENGINEER</span>
                        <div class="user-avatar"></div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- VIEWPORT -->
                <div class="viewport-content" id="viewport">
                    <section id="homePage" class="page"></section>
                    <section id="digitalTwinPage" class="page" style="display: none;"></section>
                    <section id="alertStackPage" class="page" style="display: none;"></section>
                    <section id="analyticsPage" class="page" style="display: none;"></section>
                    <section id="diagnosticsPage" class="page" style="display: none;"></section>
                    <div id="schedulerPage" class="page" style="display: none;"></div>
                </div>

                <!-- AI INSIGHTS SIDEBAR -->
                <aside class="insight-sidebar">
                    <div class="ai-header">
                        <span class="ai-icon">🧠</span>
                        <div class="ai-title">
                            <h3>AI INSIGHTS</h3>
                            <p>Predictive Engine Active</p>
                        </div>
                    </div>

                    <div class="insight-feed" id="insight-feed">
                        <!-- Dynamic Insights -->
                    </div>

                    <div class="live-feed-wrap">
                        <div class="live-feed">
                            <span>LIVE FEED: NODE-09 SYSTEM OVERWATCH</span>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- Particle animation for login portal -->
    <script>
    (function() {
        const canvas = document.getElementById('particleCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 50;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                radius: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.3 + 0.05
            };
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(createParticle());
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 229, 255, ${p.opacity})`;
                ctx.fill();
            });

            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 229, 255, ${0.03 * (1 - dist / 150)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(draw);
        }
        draw();
    })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js?v=5.0"></script>
</body>
</html>
